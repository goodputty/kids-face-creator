<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Portrait Builder" />
  <title>Portrait Builder – Portraits by Jun-Yi</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- ★ Replace this with the actual path to your Inter Mush font file -->
  <!-- Upload inter-mush.woff2 to the same folder as this index.html   -->
  <style>
    @font-face {
      font-family: 'InterMush';
      src: url('inter-mush.woff2') format('woff2');
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'InterMush', 'Nunito', system-ui, sans-serif;
      background: #F5F0E8;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    #header {
      background: linear-gradient(135deg, #C8B99A, #A89070);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(120,90,60,0.2);
    }
    #header .brand-sub {
      font-size: 9px; font-weight: 800;
      color: rgba(255,255,255,0.75);
      letter-spacing: 3px; text-transform: uppercase;
    }
    #header .brand-title {
      font-size: 20px; font-weight: 900; color: white;
    }
    #save-btn {
      background: white; color: #8B6F47;
      font-family: inherit; font-weight: 900; font-size: 14px;
      padding: 11px 22px; border-radius: 40px; border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      display: flex; align-items: center; gap: 8px;
      transition: opacity 0.2s;
    }
    #save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Body ── */
    #body {
      flex: 1; display: flex; overflow: hidden; min-height: 0;
    }

    /* ── Left: preview ── */
    #preview-col {
      width: 42%; flex-shrink: 0;
      padding: 16px 14px 16px 20px;
      display: flex; align-items: center; justify-content: center;
    }
    #portrait-outer {
      width: 100%;
      max-width: 260px;
      /* Cap height so portrait never overflows the body area */
      max-height: calc(100vh - 70px);
      aspect-ratio: 2 / 3;
      position: relative;
    }
    #portrait-wrap {
      position: absolute; inset: 0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      transition: background 0.25s;
    }
    #portrait-wrap > * {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }
    #layer-face   { object-fit: contain; }
    #layer-clothes{ object-fit: contain; }
    #layer-hair   { object-fit: contain; }
    #layer-acc    { object-fit: contain; display: none; }
    #layer-name {
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 5%;
      font-family: 'InterMush', system-ui;
      font-weight: 900; font-size: clamp(18px, 4.5vw, 40px);
      letter-spacing: 3px; text-transform: uppercase;
      pointer-events: none;
      text-align: center;
      background: transparent !important;
    }

    /* ── Right: options ── */
    #options-col {
      flex: 1; overflow-y: auto;
      padding: 20px 20px 40px 14px;
      display: flex; flex-direction: column; gap: 20px;
    }
    #options-col::-webkit-scrollbar { width: 4px; }
    #options-col::-webkit-scrollbar-thumb { background: #C8B99A; border-radius: 4px; }

    .section-label {
      font-size: 11px; font-weight: 900; color: #8B6F47;
      text-transform: uppercase; letter-spacing: 2.5px;
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 10px;
    }
    .section-divider {
      height: 1px; background: #E8E0D0; margin-top: 6px;
    }

    /* Colour swatches */
    .swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .swatch {
      width: 40px; height: 40px; border-radius: 50%;
      border: none; cursor: pointer; flex-shrink: 0;
      outline: 3px solid transparent; outline-offset: 3px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: all 0.15s;
    }
    .swatch.selected {
      outline-color: #FF8FAB;
      box-shadow: 0 0 0 2px white, 0 0 0 6px #FF8FAB;
    }

    /* Thumbnail grid */
    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
      gap: 5px;
    }
    .thumb-btn {
      width: 100%;
      aspect-ratio: 1 / 1 !important;
      border-radius: 8px;
      border: 2px solid #f0dde8;
      background: #fdf0f6;
      cursor: pointer; overflow: hidden; padding: 0;
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-btn.none-btn { background: #faf5f8; }
    .thumb-btn.selected {
      border: 3px solid #8B6F47;
      box-shadow: 0 0 0 2px white, 0 0 0 5px #8B6F47;
    }
    .thumb-btn img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-btn .thumb-label {
      font-size: 8px; color: #dbb0c8; font-weight: 700;
      text-align: center; padding: 3px; line-height: 1.3;
    }
    .thumb-tick {
      display: none; position: absolute; top: 5px; right: 5px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #FF8FAB; color: white;
      font-size: 10px; font-weight: 900;
      align-items: center; justify-content: center;
    }
    .thumb-btn.selected .thumb-tick { display: flex; }

    /* Name input */
    #name-input {
      width: 100%; padding: 14px 18px;
      border-radius: 16px; border: 2px solid #E0D5C0;
      font-size: 22px; font-weight: 900;
      font-family: 'InterMush', system-ui;
      background: #fff; outline: none;
      letter-spacing: 3px; text-transform: uppercase;
      caret-color: #8B6F47;
      transition: border 0.15s;
    }
    #name-input:focus { border-color: #8B6F47; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div id="header">
  <div>
    <div class="brand-sub">Portraits by Jun-Yi</div>
    <div class="brand-title">Make your own portrait! 🎨</div>
  </div>
  <button id="save-btn">⬆️ Save &amp; AirDrop</button>
</div>

<!-- ── Body ── -->
<div id="body">

  <!-- Left: portrait preview -->
  <div id="preview-col">
    <div id="portrait-outer">
      <div id="portrait-wrap">

      <!-- Layer order: clothes → face → hair → accessory → name -->
      <img id="layer-clothes" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="clothes" />
      <img id="layer-face"    style="display:block;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="face" src="images/face-fair.png" />
      <img id="layer-hair"    style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="hair" />
      <img id="layer-acc"     style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="accessory" />

      <!-- Name overlay -->
      <div id="layer-name"></div>
    </div><!-- end portrait-wrap -->
    </div><!-- end portrait-outer -->
  </div>

  <!-- Right: scrollable options -->
  <div id="options-col">

    <!-- 1. Gezicht -->
    <div>
      <div class="section-label"><span>🎨</span> Gezicht</div>
      <div class="swatch-row" id="skin-swatches"></div>
      <div class="section-divider"></div>
    </div>

    <!-- 2. Haarkleur -->
    <div>
      <div class="section-label"><span>🎨</span> Haarkleur</div>
      <div class="swatch-row" id="hair-color-swatches"></div>
      <div class="section-divider"></div>
    </div>

    <!-- 3. Haarstijl -->
    <div>
      <div class="section-label"><span>💇</span> Haarstijl</div>
      <div class="thumb-grid" id="hair-grid"></div>
      <div class="section-divider"></div>
    </div>

    <!-- 4. Kleding -->
    <div>
      <div class="section-label"><span>👕</span> Kleding</div>
      <div class="thumb-grid" id="clothes-grid"></div>
      <div class="section-divider"></div>
    </div>

    <!-- 5. Accessoire -->
    <div>
      <div class="section-label"><span>✨</span> Accessoire</div>
      <div class="thumb-grid" id="acc-grid"></div>
      <div class="section-divider"></div>
    </div>

    <!-- 6. Jouw naam -->
    <div>
      <div class="section-label"><span>✏️</span> Jouw naam</div>
      <input id="name-input" type="text" maxlength="16" placeholder="Naam" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
      <div class="section-divider"></div>
    </div>

    <!-- 7. Naamkleur -->
    <div>
      <div class="section-label"><span>🖊️</span> Naamkleur</div>
      <div class="swatch-row" id="name-swatches"></div>
      <div class="section-divider"></div>
    </div>

    <!-- 8. Achtergrond -->
    <div>
      <div class="section-label"><span>🌈</span> Achtergrond</div>
      <div class="swatch-row" id="bg-swatches"></div>
      <div class="section-divider"></div>
    </div>

    <div style="height:20px"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
