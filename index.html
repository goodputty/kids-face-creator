    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'InterMush', 'Nunito', system-ui, sans-serif;
      background: #FFFBF7;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    #header {
      background: #f0ce5b;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(180,130,0,0.15);
    }
    #header .brand-sub {
      font-size: 9px; font-weight: 800;
      color: rgba(60,40,10,0.55);
      letter-spacing: 3px; text-transform: uppercase;
    }
    #header .brand-title {
      font-size: 20px; font-weight: 900; color: #3a2208;
    }
    #save-btn {
      background: white; color: #3a2208;
      font-family: inherit; font-weight: 900; font-size: 14px;
      padding: 11px 22px; border-radius: 40px; border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      display: flex; align-items: center; gap: 8px;
      transition: opacity 0.2s;
    }
    #save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Body ── */
    #body {
      flex: 1; display: flex; overflow: hidden; min-height: 0;
    }

    /* ── Left: preview — exactly 50% width, portrait fills it ── */
    #preview-col {
      width: 50%;
      flex-shrink: 0;
      padding: 24px 16px;
      display: flex; align-items: center; justify-content: center;
      box-sizing: border-box;
    }
    #portrait-outer {
      width: 100%;
      max-width: calc((100vh - 66px - 48px) * 2 / 3);
      aspect-ratio: 2 / 3;
      position: relative;
    }
    #portrait-wrap {
      position: absolute; inset: 0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      transition: background 0.25s;
    }
    #portrait-wrap > * {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }
    #layer-face   { object-fit: contain; }
    #layer-clothes{ object-fit: contain; }
    #layer-hair   { object-fit: contain; }
    #layer-acc    { object-fit: contain; }
    #layer-name {
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 5%;
      font-family: 'InterMush', system-ui;
      font-weight: 900;
      letter-spacing: 3px; text-transform: uppercase;
      pointer-events: none;
      text-align: center;
      background: transparent !important;
      white-space: nowrap;
      overflow: visible;
    }

    /* ── Right: options — exactly 50% width ── */
    #options-col {
      width: 50%;
      flex-shrink: 0;
      overflow-y: auto;
      padding: 20px 20px 40px 14px;
      display: flex; flex-direction: column; gap: 20px;
    }
    #options-col::-webkit-scrollbar { width: 4px; }
    #options-col::-webkit-scrollbar-thumb { background: #f0ce5b; border-radius: 4px; }

    .section-label {
      font-size: 11px; font-weight: 900; color: #3351c6;
      text-transform: uppercase; letter-spacing: 2.5px;
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 10px;
    }
    .section-divider {
      height: 1px; background: #f0e8dc; margin-top: 6px;
    }

    /* Colour swatches */
    .swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Thumbnail grid — portrait ratio 2:3, smaller ── */
    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
      gap: 5px;
    }
    .thumb-btn {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 8px;
      border: 2px solid #e8ddd0;
      background: #F5EFE8;
      cursor: pointer; overflow: hidden; padding: 0;
      position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-btn.none-btn { background: #F8F3EE; }
    .thumb-btn.selected {
      border: 3px solid #9a8a78;
      box-shadow: none;
    }
    .thumb-btn img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: top center;
    }
    .thumb-btn .thumb-label {
      font-size: 7px; color: #C0A888; font-weight: 700;
      text-align: center; padding: 2px; line-height: 1.3;
    }
    .thumb-tick { display: none; }

    /* ── Face thumbnails ── */
    .face-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
      gap: 5px;
    }
    .face-btn {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 8px;
      border: 2px solid #e8ddd0;
      background: #F5EFE8;
      cursor: pointer; overflow: hidden; padding: 0;
      position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      transition: all 0.15s;
    }
    .face-btn img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: top center;
    }
    .face-btn.selected {
      border: 3px solid #9a8a78;
      box-shadow: none;
    }
    .face-btn .thumb-tick { display: none; }

    /* ── Hair colour swatches ── */
    .haircolor-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .haircolor-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid #e8ddd0;
      cursor: pointer; flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: all 0.15s;
    }
    .haircolor-btn.selected {
      border: 3px solid #9a8a78;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* ── Name colour — "A" buttons ── */
    .namecolor-row { display: flex; gap: 7px; flex-wrap: wrap; }
    .namecolor-btn {
      width: 40px; height: 40px; border-radius: 8px;
      border: 2px solid #e8ddd0;
      background: #F8F3EE;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900;
      font-family: 'InterMush', system-ui;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
      transition: all 0.15s;
    }
    .namecolor-btn.selected {
      border: 3px solid #9a8a78;
    }

    /* ── Background colour — portrait rectangles ── */
    .bgcolor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
      gap: 5px;
    }
    .bgcolor-btn {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 8px;
      border: 2px solid #e8ddd0;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transition: all 0.15s;
    }
    .bgcolor-btn.selected {
      border: 3px solid #9a8a78;
    }

    /* Name input */
    #name-input {
      width: 100%; padding: 14px 18px;
      border-radius: 16px; border: 2px solid #e8ddd0;
      font-size: 22px; font-weight: 900;
      font-family: 'InterMush', system-ui;
      background: #fff; outline: none;
      letter-spacing: 3px; text-transform: uppercase;
      caret-color: #c2221b;
      transition: border 0.15s;
    }
    #name-input:focus { border-color: #c2221b; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div id="header">
  <div>
    <div class="brand-sub">Portraits by Jun-Yi</div>
    <div class="brand-title">Maak je eigen portret! 🎨</div>
  </div>
  <button id="save-btn">⬆️ Save &amp; AirDrop</button>
</div>

<!-- ── Body ── -->
<div id="body">

  <!-- Left: portrait preview -->
  <div id="preview-col">
    <div id="portrait-outer">
      <div id="portrait-wrap">

      <!-- Layer order: clothes → face → hair → accessory → name -->
      <img id="layer-clothes" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="clothes" />
      <img id="layer-face"    style="display:block;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="face" src="images/face-fair.png" />
      <img id="layer-hair"    style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="hair" />
      <img id="layer-acc"     style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="accessory" />

      <!-- Name overlay -->
      <div id="layer-name"></div>
    </div><!-- end portrait-wrap -->
    </div><!-- end portrait-outer -->
  </div>

  <!-- Right: scrollable options -->
  <div id="options-col">

    <!-- 1. Gezicht — image thumbnails -->
    <div>
